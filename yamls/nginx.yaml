apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-app2
  name: nginx-app
  namespace: prod3
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app2
  template:
    metadata:
      labels:
        app: nginx-app2
    spec:
      containers:
      - image: nginx
        name: nginx-con
